name: Glacier
options:
  bundleIdPrefix: com.jfrech
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  ENABLE_HARDENED_RUNTIME: NO
  CODE_SIGN_STYLE: Manual
  CODE_SIGN_IDENTITY: "-"
  DEVELOPMENT_TEAM: ""
  ALWAYS_SEARCH_USER_PATHS: NO
  CLANG_ENABLE_MODULES: YES
  SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  DEBUG_INFORMATION_FORMAT: dwarf
  ENABLE_TESTABILITY: YES
  GCC_OPTIMIZATION_LEVEL: "0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0
  MarkdownEditor:
    path: Packages/MarkdownEditor
  Bonsplit:
    url: https://github.com/almonk/bonsplit
    from: 1.1.1
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1

targets:
  Glacier:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Glacier
        excludes:
          - "**/*.md"
    resources:
      - path: Glacier/Resources/markwhen.html
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.jfrech.Glacier
      INFOPLIST_FILE: Glacier/Info.plist
      CODE_SIGN_ENTITLEMENTS: Glacier/Glacier.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: MarkdownEditor
        product: MarkdownEditor
      - package: Bonsplit
        product: Bonsplit
      - package: MarkdownUI
        product: MarkdownUI

  GlacierUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: GlacierUITests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.jfrech.GlacierUITests
      INFOPLIST_FILE: GlacierUITests/Info.plist
      TEST_TARGET_NAME: Glacier
      SWIFT_STRICT_CONCURRENCY: minimal
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Manual
      ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - target: Glacier
